<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tulip Garden</title>
    <style>
      * { margin:0; padding:0; box-sizing:border-box; }
      body, html { width:100%; height:100%; overflow:hidden; font-family:Inter,system-ui,sans-serif; background: #060617; color:#fafafa; }
      #root { width:100%; height:100%; }
      .bg-background { background: radial-gradient(circle at 20% 20%, #38377a 0%, #090a1b 60%, #03040d 100%); }
      .star { position:absolute; border-radius:50%; background:white; opacity:.26; }
      .tulip { position:absolute; transform:translate(-50%, -100%) scale(0); width:40px; height:60px; pointer-events:none; animation: bloom 0.35s ease-out forwards; }
      .sparkle { position:absolute; width:8px; height:8px; background: linear-gradient(45deg,#fff,#ffd3e1); border-radius:50%; opacity:.9; pointer-events:none; animation: sparkle 0.7s ease-in-out forwards; }
      @keyframes sparkle { 0% { transform:scale(0.6); opacity:1; } 100% { transform:scale(2.5) translate(-6px,-18px); opacity:0; }}
      @keyframes bloom { 0% { transform: translate(-50%, -100%) scale(0); opacity: 0; }
                      60% { transform: translate(-50%, -100%) scale(1.1); opacity: 1; }
                     100% { transform: translate(-50%, -100%) scale(1); opacity: 1; }}
      @keyframes float-star { 0%,100% { transform: translateY(0); opacity:.25;} 50% { transform: translateY(-5px); opacity:.7; }}
      .header, .counter { position:absolute; left:0; right:0; text-align:center; z-index:10; pointer-events:none; }
      .header { top:1.5rem; }
      .counter { bottom:1.5rem; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" data-presets="react">
      const { useState, useCallback, useRef } = React;

      const STARS = Array.from({ length: 60 }, (_, i) => ({
        id: i,
        x: Math.random() * 100,
        y: Math.random() * 100,
        size: 1 + Math.random() * 2,
        delay: Math.random() * 4,
        duration: 2 + Math.random() * 3,
      }));

      const playSparkleSound = () => {
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const now = ctx.currentTime;
          [800, 1200, 1600].forEach((freq, i) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, now);
            osc.frequency.exponentialRampToValueAtTime(freq * 1.5, now + 0.15);
            gain.gain.setValueAtTime(0.08, now + i * 0.05);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4 + i * 0.05);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(now + i * 0.05);
            osc.stop(now + 0.5 + i * 0.05);
          });
        } catch (e) {
          // Audio API unavailable
        }
      };

      function Tulip({ x, y }) {
        return (
          <div className="tulip" style={{ left: x, top: y, transform: 'translate(-50%, -100%)' }}>
            <div style={{ position: 'relative', top: '0px', width: '18px', height: '18px', margin: '0 auto' }}>
              <div style={{ position: 'absolute', width: '10px', height: '16px', borderRadius: '50% 50% 0 0', background: '#ff6699', top: 0, left: 0, transform: 'rotate(-25deg)', transformOrigin: '50% 100%' }} />
              <div style={{ position: 'absolute', width: '10px', height: '16px', borderRadius: '50% 50% 0 0', background: '#ff77ac', top: 0, left: '4px', transform: 'rotate(0deg)', transformOrigin: '50% 100%' }} />
              <div style={{ position: 'absolute', width: '10px', height: '16px', borderRadius: '50% 50% 0 0', background: '#ffb3d9', top: 0, left: '8px', transform: 'rotate(25deg)', transformOrigin: '50% 100%' }} />
            </div>
            <div style={{ width: '3px', height: '40px', background: '#5ecf59', margin: '0 auto', marginTop: '2px' }} />
          </div>
        );
      }

      function Sparkle({ x, y }) {
        return <div className="sparkle" style={{ left: x - 12, top: y - 18 }} />;
      }

      function LoveMessage({ index }) {
        const messages = ['You are loved', 'Always together', 'Bloom forever', 'You make my heart grow'];
        return (
          <div style={{
            position: 'absolute',
            left: '50%',
            top: '50%',
            transform: 'translate(-50%, -50%)',
            color: '#ffe2f5',
            fontSize: '1.1rem',
            fontWeight: 700,
            padding: '0.4rem 0.9rem',
            border: '1px solid rgba(255,255,255,0.4)',
            borderRadius: '999px',
            background: 'rgba(0,0,0,0.3)',
            pointerEvents: 'none',
            opacity: 0.95,
          }}>
            {messages[index % messages.length]}
          </div>
        );
      }

      function App() {
        const [tulips, setTulips] = useState([]);
        const [sparkles, setSparkles] = useState([]);
        const [messages, setMessages] = useState([]);
        const nextId = useRef(0);
        const tulipCount = useRef(0);
        const msgIndex = useRef(0);

        const plantTulip = useCallback((x, y) => {
          const id = nextId.current++;
          setTulips(prev => [...prev, { id, x, y }]);
          setSparkles(prev => [...prev, { id, x, y }]);
          playSparkleSound();
          tulipCount.current++;
          if (tulipCount.current % 10 === 0) {
            const msgId = msgIndex.current++;
            setMessages(prev => [...prev, msgId]);
            setTimeout(() => setMessages(prev => prev.filter(m => m !== msgId)), 3800);
          }
          setTimeout(() => setSparkles(prev => prev.filter(s => s.id !== id)), 900);
        }, []);

        const handleClick = useCallback(e => plantTulip(e.clientX, e.clientY), [plantTulip]);
        const handleTouch = useCallback(e => {
          if (!e.touches.length) return;
          e.preventDefault();
          const t = e.touches[0];
          plantTulip(t.clientX, t.clientY);
        }, [plantTulip]);

        return (
          <div className="bg-background" style={{ width: '100%', height: '100%', position: 'relative' }} onClick={handleClick} onTouchStart={handleTouch}>
            {STARS.map(star => (
              <div key={star.id} className="star" style={{ left: `${star.x}%`, top: `${star.y}%`, width: `${star.size}px`, height: `${star.size}px`, animation: `float-star ${star.duration}s ${star.delay}s ease-in-out infinite` }} />
            ))}
            <div className="header">
              <h1 style={{ fontFamily: 'serif', fontSize: '2rem', margin: 0 }}><span style={{ color: '#ff88b9' }}>✿</span> Dear Indu <span style={{ color: '#ff88b9' }}>✿</span></h1>
              <p style={{ color: '#dde2f7', fontSize: '0.8rem', letterSpacing: '0.12em', textTransform: 'uppercase', marginTop: '0.4rem' }}>Tap anywhere to plant a tulip</p>
            </div>
            <div className="counter"><span style={{ color: '#b3c0dc', fontFamily: 'monospace', fontSize: '0.9rem' }}>🌷 {tulips.length} tulips bloomed to your touch</span></div>
            {tulips.map(t => <Tulip key={t.id} x={t.x} y={t.y} />)}
            {sparkles.map(s => <Sparkle key={s.id} x={s.x} y={s.y} />)}
            {messages.map(m => <LoveMessage key={m} index={m} />)}
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
