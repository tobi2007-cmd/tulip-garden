<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tulip Garden</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body,html{
  width:100%;height:100%;
  overflow:hidden;
  font-family:Inter,system-ui;
  background:#02030a;
  color:#fff;
}
#root{width:100%;height:100%;}

.bg-background{
  background:
  radial-gradient(circle at 30% 20%, rgba(80,60,180,0.4), transparent 40%),
  radial-gradient(circle at 70% 60%, rgba(255,100,150,0.15), transparent 50%),
  linear-gradient(180deg,#050617,#01020a);
}

.star{
  position:absolute;
  border-radius:50%;
  background:white;
  opacity:.3;
}

.tulip{
  position:absolute;
  transform:translate(-50%,-100%) scale(0);
  animation:bloom 0.45s cubic-bezier(.2,1.4,.4,1) forwards;
  filter: drop-shadow(0 0 6px rgba(255,120,170,0.5));
}

.sparkle{
  position:absolute;
  width:6px;height:6px;
  background:white;
  border-radius:50%;
  pointer-events:none;
  animation:sparkle 0.8s ease-out forwards;
}

@keyframes sparkle{
  0%{opacity:1; transform:scale(1);}
  100%{
    opacity:0;
    transform:translate(var(--x), var(--y)) scale(2);
  }
}

@keyframes bloom{
  0%{transform:translate(-50%,-100%) scale(0);opacity:0;}
  70%{transform:translate(-50%,-100%) scale(1.15);}
  100%{transform:translate(-50%,-100%) scale(1);opacity:1;}
}

@keyframes float-star{
  0%,100%{transform:translateY(0);opacity:.3;}
  50%{transform:translateY(-6px);opacity:.8;}
}

.header,.counter{
  position:absolute;
  left:0;right:0;
  text-align:center;
  pointer-events:none;
}
.header{top:1.5rem;}
.counter{bottom:1.5rem;}
</style>
</head>

<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const {useState,useRef,useCallback}=React;

const STARS = Array.from({length:70},(_,i)=>({
  id:i,
  x:Math.random()*100,
  y:Math.random()*100,
  size:1+Math.random()*2,
  delay:Math.random()*4,
  duration:2+Math.random()*3
}));

const playSparkleSound = () => {
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const now=ctx.currentTime;

    const freqs=[880,1320,1760];
    freqs.forEach((f,i)=>{
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();

      osc.type="triangle";
      osc.frequency.setValueAtTime(f,now);
      gain.gain.setValueAtTime(0.06,now+i*0.05);
      gain.gain.exponentialRampToValueAtTime(0.0001,now+0.5);

      osc.connect(gain);
      gain.connect(ctx.destination);

      osc.start(now+i*0.05);
      osc.stop(now+0.5);
    });
  }catch{}
};

function Tulip({x,y}){
  return(
    <div className="tulip" style={{left:x,top:y}}>
      <div style={{position:'relative',width:'18px',height:'18px',margin:'0 auto'}}>
        <div style={{position:'absolute',width:'10px',height:'16px',background:'#ff5fa2',borderRadius:'50% 50% 0 0',left:0,transform:'rotate(-25deg)'}}/>
        <div style={{position:'absolute',width:'10px',height:'16px',background:'#ff77b5',borderRadius:'50% 50% 0 0',left:'4px'}}/>
        <div style={{position:'absolute',width:'10px',height:'16px',background:'#ffc1dd',borderRadius:'50% 50% 0 0',left:'8px',transform:'rotate(25deg)'}}/>
      </div>
      <div style={{width:'3px',height:'40px',background:'#5ecf59',margin:'2px auto'}}/>
    </div>
  );
}

function Sparkle({x,y}){
  return(
    <>
      {[...Array(6)].map((_,i)=>{
        const angle=(Math.PI*2/6)*i;
        const dist=20+Math.random()*10;
        const dx=Math.cos(angle)*dist+'px';
        const dy=Math.sin(angle)*dist+'px';
        return <div key={i} className="sparkle" style={{
          left:x, top:y,
          '--x':dx,
          '--y':dy
        }}/>
      })}
    </>
  );
}

function LoveMessage({index}){
  const msgs=[
    "You are my favorite place 💖",
    "Every click blooms CARE 🌷",
    "You make everything magical ✨",
    "Forever your FRIEND❤️"
  ];
  return(
    <div style={{
      position:'absolute',
      left:'50%',
      top:'50%',
      transform:'translate(-50%,-50%)',
      background:'rgba(0,0,0,0.4)',
      padding:'10px 18px',
      borderRadius:'999px',
      border:'1px solid rgba(255,255,255,0.3)',
      color:'#ffd6f0',
      fontWeight:'600'
    }}>
      {msgs[index % msgs.length]}
    </div>
  );
}

function App(){
  const [tulips,setTulips]=useState([]);
  const [sparkles,setSparkles]=useState([]);
  const [messages,setMessages]=useState([]);

  const idRef=useRef(0);
  const count=useRef(0);
  const msgIndex=useRef(0);

  const plant=(x,y)=>{
    const id=idRef.current++;
    setTulips(p=>[...p,{id,x,y}]);
    setSparkles(p=>[...p,{id,x,y}]);

    playSparkleSound();

    count.current++;

    if(count.current%10===0){
      const m=msgIndex.current++;
      setMessages(p=>[...p,m]);
      setTimeout(()=>setMessages(p=>p.filter(v=>v!==m)),3000);
    }

    setTimeout(()=>setSparkles(p=>p.filter(s=>s.id!==id)),800);
  };

  const click=e=>plant(e.clientX,e.clientY);

  return(
    <div className="bg-background" style={{width:'100%',height:'100%'}} onClick={click}>
      
      {STARS.map(s=>(
        <div key={s.id} className="star"
          style={{
            left:s.x+'%',
            top:s.y+'%',
            width:s.size,
            height:s.size,
            animation:`float-star ${s.duration}s ${s.delay}s infinite`
          }}
        />
      ))}

      <div className="header">
        <h1>✿ Dear Chahat ✿</h1>
        <p style={{opacity:.7,fontSize:'0.8rem'}}>Tap to bloom love</p>
      </div>

      <div className="counter">
        🌷 {tulips.length} tulips
      </div>

      {tulips.map(t=><Tulip key={t.id} x={t.x} y={t.y}/>)}
      {sparkles.map(s=><Sparkle key={s.id} x={s.x} y={s.y}/>)}
      {messages.map(m=><LoveMessage key={m} index={m}/>)}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
